<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Smart Grammar Explainer</title>

    <style>

        body{
            font-family:Arial;
            max-width:800px;
            margin:auto;
            padding:20px;
        }

        textarea{
            width:100%;
            height:200px;
        }

        select,input{
            width:100%;
            padding:10px;
            margin-top:10px;
        }

        button{
            margin-top:15px;
            padding:10px 20px;
        }

        #result{
            margin-top:20px;
            border:1px solid #ddd;
            padding:15px;
        }

    </style>

</head>

<body>

<h1>Smart Grammar Explainer</h1>

<label>Text to Analyze</label>

<textarea id="text"></textarea>

<label>Language</label>

<select id="lang">
    <option>English</option>
    <option>French</option>
</select>

<label>Tone</label>

<select id="tone">
    <option>Academic</option>
    <option>Casual</option>
</select>

<label>Email</label>

<input
    type="email"
    id="email"
    placeholder="example@gmail.com"
>

<button onclick="analyzeText()">
    Analyze Text
</button>

<div id="result">

    Result will appear here...

</div>

<script>

async function analyzeText(){

    const text =
        document.getElementById("text").value;

    const lang =
        document.getElementById("lang").value;

    const tone =
        document.getElementById("tone").value;

    const email =
        document.getElementById("email").value;

    const response = await fetch(
        "https://giabao071.app.n8n.cloud/webhook-test/grammar-check",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                text:text,
                lang:lang,
                tone:tone,
                email:email
            })
        }
    );

const data = await response.json();

const result = document.getElementById("result");

result.innerHTML = `
  <h3>Corrected Text</h3>
  <p>${data.correctedText}</p>

  <h3>Errors</h3>
  ${data.errors.map(e => `
    <div style="padding:10px; border:1px solid #ddd; margin-bottom:10px;">
      <b>Original:</b> ${e.original} <br>
      <b>Correction:</b> ${e.correction} <br>
      <b>Explanation:</b> ${e.explanation}
    </div>
  `).join("")}
`;

</script>

</body>
</html>
